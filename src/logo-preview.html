<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plattinger.no Logo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2027 100%);
            font-family: 'Inter', sans-serif;
        }
        .logo-container {
            text-align: center;
        }
        h1 {
            color: white;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Bakgrundscirkel -->
            <circle cx="100" cy="100" r="95" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
            
            <!-- Gran (vänster sida) -->
            <polygon points="60,140 60,60 50,60 70,30 90,60 80,60 80,80 95,80 75,110 90,110 65,140" 
                     fill="#27ae60" stroke="#229954" stroke-width="2"/>
            
            <!-- Nyckel (höger sida, gul) -->
            <g transform="translate(110, 50) rotate(-45)">
                <!-- Nyckelring -->
                <circle cx="15" cy="15" r="12" fill="none" stroke="#f1c40f" stroke-width="6"/>
                <!-- Nyckelskaft -->
                <rect x="10" y="25" width="10" height="50" fill="#f1c40f" rx="2"/>
                <!-- Nyckelklyka -->
                <rect x="5" y="60" width="20" height="8" fill="#f1c40f" rx="1"/>
                <rect x="5" y="72" width="15" height="8" fill="#f1c40f" rx="1"/>
            </g>
            
            <!-- Mejsel (diagonal, silver) -->
            <g transform="translate(100, 100) rotate(-30)">
                <!-- Mejselhandtag (svart) -->
                <rect x="-8" y="-60" width="16" height="50" fill="#2c3e50" rx="3"/>
                <!-- Mejselskaft (silver) -->
                <rect x="-6" y="-10" width="12" height="40" fill="#95a5a6" rx="2"/>
                <!-- Mejselspets (mörkare silver) -->
                <polygon points="-6,30 6,30 0,50" fill="#7f8c8d"/>
            </g>
            
            <!-- Text "Plattinger.no" längst ner -->
            <text x="100" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
                  fill="white" text-anchor="middle" letter-spacing="1">PLATTINGER.NO</text>
        </svg>
        
        <h1>Plattinger.no Logo</h1>
        <p style="color: #bdc3c7; font-size: 14px;">Gran + Nyckel + Mejsel = Bygg &amp; Platting</p>
    </div>
</body>
</html>
