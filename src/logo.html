<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plattinger.no Logo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1e3a5f;
            font-family: 'Inter', sans-serif;
        }
        .logo-container {
            text-align: center;
        }
        h1 {
            color: white;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Bakgrund -->
            <rect width="200" height="200" fill="#1e3a5f"/>
            
            <!-- Gran (vänster) - enkel stiliserad -->
            <g transform="translate(55, 100)">
                <!-- Träd topp -->
                <polygon points="0,-40 -25,10 25,10" fill="#4ade80"/>
                <!-- Träd mitten -->
                <polygon points="0,-20 -30,25 30,25" fill="#4ade80"/>
                <!-- Träd botten -->
                <polygon points="0,5 -35,45 35,45" fill="#4ade80"/>
                <!-- Stam -->
                <rect x="-8" y="45" width="16" height="15" fill="#8B4513" rx="2"/>
            </g>
            
            <!-- Korsade verktyg (höger) -->
            <g transform="translate(135, 100)">
                <!-- Skruvmejsel (diagonal uppåt) -->
                <g transform="rotate(-45)">
                    <!-- Handtag -->
                    <rect x="-8" y="-35" width="16" height="30" fill="#fbbf24" rx="4"/>
                    <!-- Skaft -->
                    <rect x="-4" y="-5" width="8" height="35" fill="#fbbf24" rx="2"/>
                    <!-- Spets -->
                    <polygon points="-4,30 4,30 0,45" fill="#f59e0b"/>
                </g>
                
                <!-- Nyckel (diagonal nedåt) -->
                <g transform="rotate(45)">
                    <!-- Nyckelring -->
                    <circle cx="0" cy="-25" r="10" fill="none" stroke="#fbbf24" stroke-width="6"/>
                    <!-- Skaft -->
                    <rect x="-5" y="-15" width="10" height="40" fill="#fbbf24" rx="2"/>
                    <!-- Klyka -->
                    <rect x="-8" y="20" width="16" height="10" fill="#fbbf24" rx="2"/>
                </g>
            </g>
        </svg>
        
        <h1 style="color: white;">Plattinger.no</h1>
        <p style="color: #94a3b8; font-size: 14px;">Gran + Verktyg = Bygg &amp; Platting</p>
    </div>
</body>
</html>
