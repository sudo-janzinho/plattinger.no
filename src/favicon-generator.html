<!DOCTYPE html>
<html>
<head>
    <title>Favicon Generator</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1e3a5f; margin: 0; }
        canvas { border: 1px solid white; }
    </style>
</head>
<body>
    <canvas id="favicon" width="64" height="64"></canvas>
    <script>
        const canvas = document.getElementById('favicon');
        const ctx = canvas.getContext('2d');
        
        // Bakgrund (transparent)
        ctx.clearRect(0, 0, 64, 64);
        
        // Gran (vänster)
        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.moveTo(20, 10);
        ctx.lineTo(5, 35);
        ctx.lineTo(15, 35);
        ctx.lineTo(8, 50);
        ctx.lineTo(18, 50);
        ctx.lineTo(12, 60);
        ctx.lineTo(28, 60);
        ctx.lineTo(22, 50);
        ctx.lineTo(32, 50);
        ctx.lineTo(25, 35);
        ctx.lineTo(35, 35);
        ctx.closePath();
        ctx.fill();
        
        // Stam
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(18, 60, 8, 4);
        
        // Verktyg (höger) - förenklad
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        
        // Skruvmejsel
        ctx.beginPath();
        ctx.moveTo(45, 15);
        ctx.lineTo(55, 25);
        ctx.stroke();
        
        // Nyckel
        ctx.beginPath();
        ctx.moveTo(55, 15);
        ctx.lineTo(45, 25);
        ctx.stroke();
        
        // Nyckelring
        ctx.beginPath();
        ctx.arc(55, 15, 5, 0, Math.PI * 2);
        ctx.stroke();
    </script>
</body>
</html>
