# Netlify konfigurasjon for plattinger.no
# Statisk HTML-sida - ingen build krävs

[build]
  publish = "src"
  command = "echo 'Ingen build krävs - statisk HTML'"

# Tillåt API-sökvägen
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# Headers for bedre caching og sikkerhet
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
